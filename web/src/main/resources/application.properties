app.name=intygsadmin

database.name=intygsadmin

erasetestcertificate.erase.after.day=31

management.server.port=8081
management.endpoints.web.exposure.include=health, banner, info, user

inera.idp.client-registration-id=siths
inera.idp.user-name-attribute-name=employeeHsaId
inera.idp.scope=openid

job.erasetestcertificate.cron=0 0 6 * * *

logging.structured.format.console=ecs

server.port=8080

spring.jpa.open-in-view=true
spring.liquibase.change-log=classpath:/changelog/db-changelog-master.xml
spring.datasource.url=jdbc:mysql://${mysql.service.host}:${mysql.service.port}/${database.name}?useSSL=false&serverTimezone=Europe/Amsterdam&allowPublicKeyRetrieval=true
spring.session.redis.namespace=${app.name}:session
spring.session.redis.flush-mode=immediate

springdoc.packagesToScan=se.inera.intyg.intygsadmin.web.controller
springdoc.swagger-ui.operationsSorter=alpha